name: Cut Video Clips

# WAJIB SAMA: "types" ini harus sama persis dengan yang dikirim oleh trigger-action/route.ts kamu
on:
  repository_dispatch:
    types: [cut-video] 

jobs:
  cut_video_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg and yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Create cookies.txt securely
        run: |
          # Memaksa pembuatan header Netscape yang valid secara manual
          echo "# Netscape HTTP Cookie File" > cookies.txt
          echo "# https://curl.haxx.se/rfc/cookie_spec.html" >> cookies.txt
          echo "# This is a generated file! Do not edit." >> cookies.txt
          echo "" >> cookies.txt
          
          # Menambahkan isi secret ke bawahnya dengan aman
          cat << 'EOF' >> cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          EOF

      - name: Download and Cut Video
        run: |
          # Mengambil variabel payload yang dikirim dari web lokalmu
          START_TIME="${{ github.event.client_payload.start_time }}"
          END_TIME="${{ github.event.client_payload.end_time }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          
          echo "Cutting video from $START_TIME to $END_TIME..."
          
          # Eksekusi pemotongan menggunakan cookie untuk menghindari blokir
          yt-dlp --cookies cookies.txt \
                 --download-sections "*$START_TIME-$END_TIME" \
                 --force-keyframes-at-cuts \
                 -o "clip_result.mp4" \
                 "$VIDEO_URL"

      - name: Upload Clipped Video as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: clipped-video
          path: clip_result.mp4