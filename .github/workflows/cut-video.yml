name: Cut Video Clips

on:
  repository_dispatch:
    types: [cut_video]

jobs:
  process-clip:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Menerima Sinyal Vercel
        run: |
          echo "Memproses video: ${{ github.event.client_payload.title }}"
          echo "URL: ${{ github.event.client_payload.video_url }}"
          echo "Start: ${{ github.event.client_payload.start_time }}s - End: ${{ github.event.client_payload.end_time }}s"

      - name: ⚙️ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚙️ Install Deno (JS runtime untuk yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: ⚙️ Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: ✂️ Download & Cut Video
        run: |
          PROXY_ARG=""
          if [ -n "${{ secrets.WEBSHARE_PROXY_URL }}" ]; then
            PROXY_ARG="--proxy ${{ secrets.WEBSHARE_PROXY_URL }}"
            echo "Menggunakan proxy untuk download..."
          fi

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $attempt of $MAX_RETRIES..."
            
            if yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              $PROXY_ARG \
              --download-sections "*${{ github.event.client_payload.start_time }}-${{ github.event.client_payload.end_time }}" \
              --force-keyframes-at-cuts \
              --extractor-retries 3 \
              --retry-sleep extractor 5 \
              --no-check-certificates \
              -o "output_clip.mp4" \
              "${{ github.event.client_payload.video_url }}"; then
              echo "Download berhasil!"
              break
            else
              echo "Attempt $attempt gagal..."
              if [ "$attempt" -eq "$MAX_RETRIES" ]; then
                echo "Semua attempt gagal!"
                exit 1
              fi
              SLEEP_TIME=$((attempt * 10))
              echo "Retry dalam ${SLEEP_TIME} detik..."
              sleep $SLEEP_TIME
            fi
          done

      - name: 📤 Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: clip-${{ github.event.client_payload.start_time }}-${{ github.event.client_payload.end_time }}
          path: output_clip.mp4
          retention-days: 7
