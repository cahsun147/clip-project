name: Cut Video Clips

on:
  repository_dispatch:
    types: [cut_video]
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
      start_time:
        description: 'Start time in seconds'
        required: true
      end_time:
        description: 'End time in seconds'
        required: true
      title:
        description: 'Clip title'
        required: true

jobs:
  process-clip:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🚀 Menerima Sinyal Vercel
        run: |
          echo "Memproses video: ${{ github.event.client_payload.title }}"
          echo "URL: ${{ github.event.client_payload.video_url }}"
          echo "Start: ${{ github.event.client_payload.start_time }}s - End: ${{ github.event.client_payload.end_time }}s"

      - name: ⚙️ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚙️ Install Deno (JS runtime untuk yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: ⚙️ Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: 🍪 Siapkan YouTube Cookies
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        run: |
          cat << 'COOKIEEOF' > cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          COOKIEEOF
          # Validasi format cookies
          if head -1 cookies.txt | grep -q 'Netscape'; then
            echo "Cookies file valid ($(wc -l < cookies.txt) baris)"
          else
            echo "WARNING: Header Netscape tidak ditemukan, menambahkan..."
            sed -i '1i# Netscape HTTP Cookie File
# https://curl.haxx.se/rfc/cookie_spec.html
# This is a generated file! Do not edit.
' cookies.txt
          fi

      - name: ✂️ Download & Cut Video
        run: |
          START="${{ github.event.client_payload.start_time }}"
          END="${{ github.event.client_payload.end_time }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          COOKIES_FLAG=""
          if [ -f cookies.txt ]; then
            COOKIES_FLAG="--cookies cookies.txt"
            echo "Menggunakan YouTube cookies"
          fi

          # Strategi 1: Cookies + tanpa proxy
          if [ -n "$COOKIES_FLAG" ]; then
            echo "=== Mencoba: Cookies + Tanpa Proxy ==="
            if yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                $COOKIES_FLAG \
                --download-sections "*${START}-${END}" \
                --force-keyframes-at-cuts \
                --extractor-retries 3 \
                --retry-sleep extractor:5 \
                -o "output_clip.mp4" \
                "$VIDEO_URL"; then
              echo "Download berhasil dengan cookies!"
              exit 0
            fi
            echo "Cookies tanpa proxy gagal, mencoba cookies + proxy..."
          fi

          # Strategi 2: Cookies + proxy via env var
          if [ -n "$COOKIES_FLAG" ] && [ -n "${{ secrets.WEBSHARE_PROXY_URL }}" ]; then
            echo "=== Mencoba: Cookies + Proxy (env var) ==="
            export HTTPS_PROXY="${{ secrets.WEBSHARE_PROXY_URL }}"
            export HTTP_PROXY="${{ secrets.WEBSHARE_PROXY_URL }}"
            if yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                $COOKIES_FLAG \
                --download-sections "*${START}-${END}" \
                --force-keyframes-at-cuts \
                --extractor-retries 3 \
                --retry-sleep extractor:5 \
                -o "output_clip.mp4" \
                "$VIDEO_URL"; then
              echo "Download berhasil dengan cookies + proxy!"
              exit 0
            fi
            echo "Cookies + proxy juga gagal!"
          fi

          # Strategi 3: Tanpa cookies, tanpa proxy (fallback terakhir)
          echo "=== Mencoba: Tanpa Cookies, Tanpa Proxy ==="
          if yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --download-sections "*${START}-${END}" \
              --force-keyframes-at-cuts \
              --extractor-retries 3 \
              --retry-sleep extractor:5 \
              -o "output_clip.mp4" \
              "$VIDEO_URL"; then
            echo "Download berhasil tanpa cookies!"
          else
            echo "Semua strategi gagal!"
            exit 1
          fi

      - name: 📤 Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: clip-${{ github.event.client_payload.start_time }}-${{ github.event.client_payload.end_time }}
          path: output_clip.mp4
          retention-days: 7
