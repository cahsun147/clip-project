name: Cut Video Clips

# WAJIB SAMA: "types" ini harus sama persis dengan yang dikirim oleh trigger-action/route.ts kamu
on:
  repository_dispatch:
    types: [cut-video] 

jobs:
  cut_video_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg, Node.js, and yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs
          python -m pip install --upgrade pip
          # yt-dlp versi pre-release + curl-cffi untuk penyamaran Browser
          pip install -U --pre "yt-dlp[default,curl-cffi]"

      - name: Create cookies.txt securely
        run: |
          # KITA BAWA KEMBALI COOKIES!
          echo "# Netscape HTTP Cookie File" > cookies.txt
          echo "# https://curl.haxx.se/rfc/cookie_spec.html" >> cookies.txt
          echo "# This is a generated file! Do not edit." >> cookies.txt
          echo "" >> cookies.txt
          
          cat << 'EOF' >> cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          EOF

      - name: Download and Cut Video
        run: |
          START_TIME="${{ github.event.client_payload.start_time }}"
          END_TIME="${{ github.event.client_payload.end_time }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          
          # 1. Mengambil SATU proxy acak dari Webshare
          PROXY_RAW=$(shuf -n 1 proxies.txt)
          IP=$(echo "$PROXY_RAW" | cut -d':' -f1)
          PORT=$(echo "$PROXY_RAW" | cut -d':' -f2)
          USER=$(echo "$PROXY_RAW" | cut -d':' -f3)
          PASS=$(echo "$PROXY_RAW" | cut -d':' -f4)
          PROXY_URL="http://$USER:$PASS@$IP:$PORT"
          
          echo "Cutting video from $START_TIME to $END_TIME..."
          echo "Using Proxy: $IP"
          
          # COMBO PAMUNGKAS: Proxy (Sembunyikan IP) + Cookies (Bypass Umur/Region) + Impersonate Chrome
          yt-dlp --proxy "$PROXY_URL" \
                 --cookies cookies.txt \
                 --impersonate Chrome \
                 --extractor-args "youtube:player_client=tv,web" \
                 --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --download-sections "*$START_TIME-$END_TIME" \
                 --force-keyframes-at-cuts \
                 -o "clip_result.mp4" \
                 "$VIDEO_URL"

      - name: Upload Clipped Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipped-video
          path: clip_result.mp4