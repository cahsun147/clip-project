name: Cut Video Clips

on:
  repository_dispatch:
    types: [cut_video]

jobs:
  process-clip:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Menerima Sinyal Vercel
        run: |
          echo "Memproses video: ${{ github.event.client_payload.title }}"
          echo "URL: ${{ github.event.client_payload.video_url }}"
          echo "Start: ${{ github.event.client_payload.start_time }}s - End: ${{ github.event.client_payload.end_time }}s"

      - name: ⚙️ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚙️ Install Deno (JS runtime untuk yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: ⚙️ Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: ✂️ Download & Cut Video
        run: |
          START="${{ github.event.client_payload.start_time }}"
          END="${{ github.event.client_payload.end_time }}"
          VIDEO_URL="${{ github.event.client_payload.video_url }}"

          download_video() {
            local proxy_arg="$1"
            local label="$2"
            echo "=== Mencoba: $label ==="
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              $proxy_arg \
              --download-sections "*${START}-${END}" \
              --force-keyframes-at-cuts \
              --extractor-retries 3 \
              --retry-sleep extractor:5 \
              -o "output_clip.mp4" \
              "$VIDEO_URL"
          }

          # Strategi 1: Tanpa proxy (deno sudah diinstall, yt-dlp bisa bypass bot detection)
          if download_video "" "Tanpa Proxy"; then
            echo "Download berhasil tanpa proxy!"
          else
            echo "Tanpa proxy gagal, mencoba dengan proxy..."

            # Strategi 2: Dengan proxy (jika secret tersedia)
            if [ -n "${{ secrets.WEBSHARE_PROXY_URL }}" ]; then
              if download_video "--proxy ${{ secrets.WEBSHARE_PROXY_URL }}" "Dengan Proxy"; then
                echo "Download berhasil dengan proxy!"
              else
                echo "Proxy juga gagal!"
                exit 1
              fi
            else
              echo "Tidak ada proxy secret yang dikonfigurasi."
              exit 1
            fi
          fi

      - name: 📤 Upload Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: clip-${{ github.event.client_payload.start_time }}-${{ github.event.client_payload.end_time }}
          path: output_clip.mp4
          retention-days: 7
