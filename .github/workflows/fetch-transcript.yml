name: Fetch Transcript

on:
  repository_dispatch:
    types: [fetch_transcript]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Install youtube-transcript-api
        run: pip3 install "youtube-transcript-api>=1.2.0" --break-system-packages

      - name: 📝 Ambil Transcript
        run: |
          python3 << 'EOF'
          import json, os
          from youtube_transcript_api import YouTubeTranscriptApi

          video_id = os.environ.get('VIDEO_ID', '')

          try:
              ytt_api = YouTubeTranscriptApi()
              transcript_list = ytt_api.list(video_id)
              try:
                  transcript_obj = transcript_list.find_transcript(['id', 'en'])
              except Exception:
                  transcript_obj = next(iter(transcript_list))
              raw = transcript_obj.fetch().to_raw_data()
              formatted = [{"text": i['text'], "offset": i['start'], "duration": i['duration']} for i in raw]
              result = {"success": True, "videoId": video_id, "transcript": formatted}
          except Exception as e:
              result = {"success": False, "error": str(e)}

          with open("transcript.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          EOF
        env:
          VIDEO_ID: ${{ github.event.client_payload.video_id }}

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-${{ github.event.client_payload.request_id }}
          path: transcript.json
          retention-days: 1
