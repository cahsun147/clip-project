name: Fetch Transcript

on:
  repository_dispatch:
    types: [fetch_transcript]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Install youtube-transcript-api
        run: pip3 install "youtube-transcript-api>=1.2.0" --break-system-packages

      - name: 📝 Ambil Transcript (dengan Proxy)
        run: |
          python3 << 'EOF'
          import json, os
          from youtube_transcript_api import YouTubeTranscriptApi

          video_id = os.environ.get('VIDEO_ID', '')
          ws_user = os.environ.get('WEBSHARE_PROXY_USERNAME', '')
          ws_pwd = os.environ.get('WEBSHARE_PROXY_PASSWORD', '')

          transcript_data = None
          last_error = ""

          # Lapis 1: Webshare Residential Proxy
          if ws_user and ws_pwd:
              try:
                  from youtube_transcript_api.proxies import WebshareProxyConfig
                  ytt_api = YouTubeTranscriptApi(
                      proxy_config=WebshareProxyConfig(
                          proxy_username=ws_user,
                          proxy_password=ws_pwd,
                      )
                  )
                  transcript_list = ytt_api.list(video_id)
                  try:
                      transcript_obj = transcript_list.find_transcript(['id', 'en'])
                  except Exception:
                      transcript_obj = next(iter(transcript_list))
                  transcript_data = transcript_obj.fetch().to_raw_data()
                  print("Berhasil via Webshare residential proxy")
              except Exception as e:
                  last_error = f"[Residential] {str(e)}"
                  print(f"WebshareProxyConfig gagal: {e}")

          # Lapis 2: Tanpa proxy (fallback)
          if not transcript_data:
              try:
                  ytt_api = YouTubeTranscriptApi()
                  transcript_list = ytt_api.list(video_id)
                  try:
                      transcript_obj = transcript_list.find_transcript(['id', 'en'])
                  except Exception:
                      transcript_obj = next(iter(transcript_list))
                  transcript_data = transcript_obj.fetch().to_raw_data()
                  print("Berhasil tanpa proxy")
              except Exception as e:
                  last_error = f"[No Proxy] {str(e)}"

          if transcript_data:
              formatted = [{"text": i['text'], "offset": i['start'], "duration": i['duration']} for i in transcript_data]
              result = {"success": True, "videoId": video_id, "transcript": formatted}
          else:
              result = {"success": False, "error": last_error[:500]}

          with open("transcript.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(json.dumps(result, ensure_ascii=False)[:500])
          EOF
        env:
          VIDEO_ID: ${{ github.event.client_payload.video_id }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-${{ github.event.client_payload.request_id }}
          path: transcript.json
          retention-days: 1
